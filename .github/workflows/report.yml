name: Generate Market Report

on:
  schedule:
    # 08h00 heure de Paris (UTC+1 hiver / UTC+2 été)
    - cron: '0 7 * * 1-5'
    # 17h00 heure de Paris
    - cron: '0 16 * * 1-5'
  # Permet de lancer manuellement depuis GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Installe les dépendances
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Génère le rapport (la clé API vient de GitHub Secrets)
      - name: Generate report
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_report.py

      # 5. Publie le rapport sur GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
